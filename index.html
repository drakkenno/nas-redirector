<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NAS Redirector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 3.5rem;
      color: white;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 20px;
    }

    .button-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    button {
      padding: 24px 60px;
      font-size: 1.3rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: white;
      color: #667eea;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
      background: #f8f9fa;
    }

    button:active {
      transform: translateY(-2px);
    }

    .guide-button {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border: 2px solid white;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .guide-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .guide-button:active {
      transform: translateY(0px);
    }
  </style>
</head>
<body>
  <button class="guide-button" onclick="openGuide()">📖 Guía de Usuario</button>
  
  <div class="container">
    <h1>NAS Server</h1>
    <p class="subtitle">Access your files anywhere</p>
    <div class="button-wrapper">
      <button onclick="openNAS()">
        Open NAS
      </button>
    </div>
  </div>

  <script>
    // This will be updated by the updater script with ngrok tunnel URL
    const NAS_URL = "https://fnlaj-79-117-251-118.a.free.pinggy.link";
    
    function openNAS() {
      if (NAS_URL && NAS_URL !== "#" && !NAS_URL.includes("loading")) {
        window.location.href = NAS_URL;
      } else {
        alert("Tunnel URL not yet available. Please wait and refresh.");
      }
    }

    function openGuide() {
      window.open("./GUIA_USUARIO.html", "_blank");
    }
  </script>
</body>
</html>
