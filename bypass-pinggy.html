<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS Server Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        
        .status {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #333;
        }
        
        .error {
            color: #d32f2f;
            background: #ffebee;
            border-left: 4px solid #d32f2f;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            display: none;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }

        .small {
            margin-top: 12px;
            color: #666;
            font-size: 0.9rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 NAS Server</h1>
        <p class="status" id="status-text">
            <div class="spinner"></div>
            <br>
            Preparing secure NAS access...
        </p>
        <div class="info">
            ✅ Sending <code>X-Pinggy-No-Screen</code> automatically<br>
            ✅ Loading NAS page directly without the warning screen<br>
            ✅ Fallback guidance if browser blocks cross-origin fetch
        </div>
        <p class="small" id="details">Checking tunnel availability...</p>
        <div class="error" id="error-msg"></div>
        <button id="retry-btn" style="display: none;" onclick="location.reload()">Retry</button>
    </div>

    <script>
        // Get the tunnel URL from the query parameter or use the configured URL
        const configUrl = "https://xdcaa-79-117-251-118.a.free.pinggy.link";
        const tunnelUrl = new URLSearchParams(window.location.search).get('url') || configUrl;
        
        const statusText = document.getElementById('status-text');
        const details = document.getElementById('details');
        const errorBox = document.getElementById('error-msg');
        const retryBtn = document.getElementById('retry-btn');

        console.log("Opening tunnel:", tunnelUrl);

        function showFailure(message) {
            statusText.innerHTML = 'Unable to load NAS automatically';
            details.textContent = 'Automatic bypass could not complete.';
            errorBox.style.display = 'block';
            errorBox.innerHTML = message;
            retryBtn.style.display = 'inline-block';
        }

        async function loadNasWithBypassHeader() {
            statusText.innerHTML = '<div class="spinner"></div><br>Fetching NAS with bypass header...';
            details.textContent = 'Requesting tunnel content with X-Pinggy-No-Screen.';

            try {
                const response = await fetch(tunnelUrl, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'include',
                    headers: {
                        'X-Pinggy-No-Screen': 'true'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const html = await response.text();

                if (/served through pinggy\.io/i.test(html) && /Enter site/i.test(html)) {
                    throw new Error('Pinggy warning page still returned by upstream');
                }

                details.textContent = 'Rendering NAS page...';

                // Render returned HTML as full document.
                document.open();
                document.write(html);
                document.close();
            } catch (error) {
                console.error('Bypass fetch failed:', error);
                showFailure(`
                    <strong>Bypass request failed:</strong> ${String(error.message || error)}<br><br>
                    If this is a browser CORS restriction, use a request-header extension and add:<br>
                    <code>X-Pinggy-No-Screen: true</code><br><br>
                    Or use a non-Pinggy tunnel provider (Cloudflare/Ngrok/Tailscale) from the startup script.
                `);
            }
        }

        loadNasWithBypassHeader();
    </script>
</body>
</html>
